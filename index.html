<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Chore Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC; --panel:#FFFDF8; --border:#FFE3B3; --tabbg:#FFEFD6;
    --ink:#3B2F1F; --ink-soft:#5A4630; --muted:#9A8A70;
    --accent1:#FFB84C; --accent2:#FF8A65; --orange:#FF6B35;
    --green:#2FA36B; --green-soft:#E9F9F0; --blue:#3D7BF4; --blue-soft:#EAF1FF;
    --purple1:#3B2F63; --purple2:#5B4B9A; --gold:#FFD23F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:linear-gradient(180deg,var(--cream) 0%,#FFF3E0 100%);
    font-family:'Nunito',sans-serif; color:var(--ink);
    padding:16px; display:flex; justify-content:center;
  }
  .frame{
    width:100%; max-width:480px; background:var(--panel);
    border-radius:28px; box-shadow:0 8px 30px rgba(90,60,20,0.12);
    overflow:hidden; border:3px solid var(--border);
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 18px 14px; background:linear-gradient(120deg,var(--accent1),var(--accent2));
  }
  .header-left{display:flex; align-items:center; gap:10px;}
  .mascot{width:44px; height:44px; border-radius:14px; background:rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center; font-size:22px;}
  .app-name{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:19px;}
  .app-sub{font-size:12.5px; color:var(--ink-soft); font-weight:600; cursor:pointer;}
  .points-pill{display:flex; align-items:center; background:rgba(255,255,255,.55);
    padding:6px 12px; border-radius:999px; font-weight:800; font-size:13px; color:var(--purple1); gap:6px; white-space:nowrap;}
  nav{display:flex; gap:4px; padding:10px 12px; background:var(--tabbg); border-bottom:1px solid var(--border);}
  nav button{flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
    padding:9px 4px; border-radius:12px; border:none; background:transparent;
    color:#8A7250; font-weight:700; font-size:12px; cursor:pointer; font-family:'Nunito',sans-serif;}
  nav button.active{background:#fff; color:var(--orange); box-shadow:0 2px 8px rgba(0,0,0,.08);}
  main{padding:18px 18px 24px;}
  .hidden{display:none !important;}

  .hero-card{background:linear-gradient(135deg,var(--purple1),var(--purple2)); border-radius:20px; padding:18px; color:#fff;}
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .hero-label{font-size:12px; opacity:.8; font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
  .hero-big{font-family:'Baloo 2',sans-serif; font-size:26px; font-weight:800; margin-top:2px;}
  .hero-big span{font-size:13px; font-weight:600; opacity:.75;}
  .level-badge{display:flex; align-items:center; gap:4px; background:var(--gold); color:var(--purple1);
    padding:6px 12px; border-radius:999px; font-size:13px; font-weight:800; white-space:nowrap;}
  .progress-track{height:12px; background:rgba(255,255,255,.2); border-radius:999px; margin-top:16px; overflow:hidden;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--gold),var(--accent2)); border-radius:999px; transition:width .4s;}
  .hero-foot{margin-top:8px; font-size:12.5px; opacity:.85; font-weight:600;}

  .stats-row{display:flex; gap:10px; margin-top:16px;}
  .stat-card{flex:1; border-radius:16px; padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .stat-value{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:16px;}
  .stat-label{font-size:10.5px; color:#7A6A55; font-weight:700; text-align:center;}

  .section-title{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px; margin-top:22px;}
  .badge-row{display:flex; gap:10px; margin-top:10px; overflow-x:auto; padding-bottom:2px;}
  .badge{display:flex; flex-direction:column; align-items:center; min-width:66px;}
  .badge-emoji{width:54px; height:54px; border-radius:16px; background:#FFF1DA; display:flex; align-items:center; justify-content:center; font-size:26px;}
  .badge-label{font-size:10px; font-weight:700; color:#7A6A55; text-align:center; margin-top:5px; line-height:1.2;}
  .badge.locked{opacity:.35;}

  .task-row{display:flex; align-items:center; gap:12px; padding:12px 14px; background:#FBF7EF;
    border-radius:16px; cursor:pointer; border:2px solid transparent; transition:all .15s; margin-bottom:10px;}
  .task-row.done{background:#EFFAF3; border-color:#C9EFD6;}
  .task-icon{font-size:24px; width:38px; text-align:center;}
  .task-name{font-weight:700; font-size:14.5px;}
  .task-row.done .task-name{text-decoration:line-through; opacity:.6;}
  .task-meta{display:flex; align-items:center; font-size:11px; color:var(--muted); margin-top:2px; gap:4px;}
  .task-points{font-weight:800; color:#FF8A00; font-size:13px; white-space:nowrap;}
  .check-circle{width:26px; height:26px; border-radius:50%; border:2.5px solid #D8CFC0;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .check-circle.done{background:var(--green); border-color:var(--green);}
  .empty-state{text-align:center; padding:30px 10px; color:var(--muted); font-weight:600; font-size:13px;}

  table.grid{border-collapse:collapse; width:100%; margin-top:12px;}
  table.grid th{font-size:10.5px; color:var(--muted); font-weight:700; padding-bottom:6px;}
  table.grid td{text-align:center; padding:3px;}
  table.grid td.name{font-size:11px; font-weight:700; color:var(--ink-soft); text-align:left; white-space:nowrap; padding-right:6px;}
  .dot{width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; margin:0 auto; background:#F0EDE5;}
  .dot.on{background:var(--green);}

  .banner{margin-top:16px; background:#FFF1DA; border-radius:14px; padding:12px 14px; font-weight:700; font-size:12.5px; color:#8A5A20; text-align:center;}

  .heat-wrap{display:flex; flex-direction:column; gap:5px; margin-top:12px;}
  .heat-row{display:flex; gap:5px;}
  .heat-cell{flex:1; aspect-ratio:1; border-radius:6px; background:#EFECE3;}

  select, input[type=number], input[type=text]{
    font-family:'Nunito',sans-serif; border:2px solid var(--border); border-radius:10px; padding:7px 10px; font-size:13px; font-weight:600; color:var(--ink);
  }

  .settings-row{display:flex; gap:8px; align-items:center; margin-bottom:10px; background:#FBF7EF; padding:10px 12px; border-radius:14px;}
  .settings-row input[type=text]{flex:2; min-width:0;}
  .settings-row input[type=number]{width:64px;}
  .icon-btn{background:none; border:none; cursor:pointer; font-size:18px; padding:4px;}
  .add-btn{width:100%; margin-top:6px; padding:12px; border-radius:14px; border:2px dashed var(--border);
    background:transparent; color:var(--orange); font-weight:800; font-size:13px; cursor:pointer;}
  .month-nav{display:flex; align-items:center; justify-content:space-between; margin-top:22px;}
  .month-nav button{background:#FBF7EF; border:none; border-radius:10px; width:32px; height:32px; font-size:16px; cursor:pointer; font-weight:800; color:var(--ink-soft);}
  .icon-picker{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;}
  .icon-picker span{font-size:20px; padding:4px 6px; border-radius:8px; cursor:pointer;}
  .icon-picker span.sel{background:#FFE3B3;}
  .mode-toggle{border:none; border-radius:999px; padding:6px 12px; font-weight:800; font-size:12px;
    cursor:pointer; background:rgba(255,255,255,.55); color:var(--purple1); white-space:nowrap; font-family:'Nunito',sans-serif;}
  .mode-toggle.parent{background:var(--purple1); color:#fff;}
  .sync-box{background:#FBF7EF; border-radius:14px; padding:12px 14px; margin-top:10px;}
  .sync-box label{font-size:11px; font-weight:700; color:var(--muted); display:block; margin:6px 0 3px;}
  .sync-box input[type=text], .sync-box input[type=password]{width:100%;}
  .sync-actions{display:flex; gap:8px; margin-top:10px;}
  .sync-actions button{flex:1; padding:9px; border-radius:10px; border:none; font-weight:800; font-size:12px; cursor:pointer;}
  .sync-save{background:var(--purple1); color:#fff;}
  .sync-status{font-size:11px; color:var(--muted); margin-top:8px; font-weight:600;}

  .weather-row{display:flex; gap:10px; margin-top:10px;}
  .weather-card{flex:1; background:#FBF7EF; border-radius:16px; padding:12px; min-width:0;}
  .weather-card-title{font-weight:800; font-size:12.5px; color:var(--ink-soft); margin-bottom:8px; display:flex; align-items:center; gap:5px;}
  table.weather-table{width:100%; border-collapse:collapse;}
  table.weather-table th{font-size:10px; color:var(--muted); font-weight:700; padding-bottom:4px;}
  table.weather-table td{text-align:center; font-size:11px; font-weight:700; color:var(--ink); padding:4px 2px; border-top:1px solid #EFE6D3; line-height:1.3;}
  table.weather-table td.period-label{text-align:left; font-size:10.5px; font-weight:700; color:var(--ink-soft); white-space:nowrap;}
  .weather-tips{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;}
  .weather-tip{font-size:10.5px; font-weight:700; background:#FFF1DA; color:#8A5A20; padding:3px 8px; border-radius:999px;}

  .admin-banner{background:linear-gradient(120deg,var(--purple1),var(--purple2)); border-radius:16px; padding:14px 16px; color:#fff; margin-top:6px;}
  .admin-banner-title{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:15px; display:flex; align-items:center; gap:6px;}
  .admin-banner ol{margin:8px 0 0; padding-left:18px; font-size:12px; line-height:1.6; opacity:.92;}
  .admin-banner li{margin-bottom:2px;}
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="header-left">
      <div class="mascot">🚀</div>
      <div>
        <div class="app-name">Chore Quest</div>
        <div class="app-sub" id="playerLabel" onclick="renamePlayer()">Tap to set name ✏️</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="modeToggle" class="mode-toggle" onclick="toggleMode()">🧒 Kid Mode</button>
      <div class="points-pill">⭐ <span id="todayPtsLabel">0 pts today</span></div>
    </div>
  </header>

  <nav>
    <button data-tab="dashboard" class="active" onclick="switchTab('dashboard')">☀️ Dashboard</button>
    <button data-tab="daily" onclick="switchTab('daily')">📅 Daily</button>
    <button data-tab="weekly" onclick="switchTab('weekly')">🗓️ Weekly</button>
    <button data-tab="monthly" onclick="switchTab('monthly')">🏆 Monthly</button>
  </nav>

  <main>
    <section id="tab-dashboard"></section>
    <section id="tab-daily" class="hidden"></section>
    <section id="tab-weekly" class="hidden"></section>
    <section id="tab-monthly" class="hidden"></section>
  </main>
</div>

<script>
/* ---------------- Storage ---------------- */
const STORE_KEY = "chore-quest-v1";

function loadState(){
  const raw = localStorage.getItem(STORE_KEY);
  if(raw){
    try{ return JSON.parse(raw); }catch(e){}
  }
  // default starter state
  return {
    player: "",
    tasks: [
      {id:1, name:"Make bed", icon:"🛏️", points:10},
      {id:2, name:"Brush teeth", icon:"🦷", points:10},
      {id:3, name:"Feed the pet", icon:"🐶", points:15},
      {id:4, name:"Pack school bag", icon:"🎒", points:10},
      {id:5, name:"Homework", icon:"📚", points:25},
      {id:6, name:"Tidy room", icon:"🧸", points:20},
    ],
    nextTaskId: 7,
    // completions: { "YYYY-MM-DD": { taskId: true } }
    completions: {}
  };
}
let state = loadState();
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

/* ---------------- Parent PIN & Mode ---------------- */
const PARENT_PIN = "1300"; // hardcoded parent PIN
let mode = "kid"; // 'kid' | 'parent'

function toggleMode(){
  if(mode === "parent"){
    mode = "kid";
    updateModeButton();
    renderAll();
    return;
  }
  const attempt = prompt("Enter parent PIN to switch to Parent Mode:");
  if(attempt === null) return;
  if(attempt.trim() === PARENT_PIN){
    mode = "parent";
    updateModeButton();
    renderAll();
  } else {
    alert("Incorrect PIN.");
  }
}

function updateModeButton(){
  const btn = document.getElementById('modeToggle');
  if(!btn) return;
  btn.textContent = mode === "parent" ? "🔓 Parent Mode" : "🧒 Kid Mode";
  btn.classList.toggle('parent', mode === "parent");
}

/* ---------------- GitHub Sync ---------------- */
const GH_KEY = "chore-quest-gh-settings";
function loadGhSettings(){
  try{ return JSON.parse(localStorage.getItem(GH_KEY)) || {}; }catch(e){ return {}; }
}
function saveGhSettings(s){ localStorage.setItem(GH_KEY, JSON.stringify(s)); }

function saveGhFromForm(){
  const owner = document.getElementById('ghOwner').value.trim();
  const repo = document.getElementById('ghRepo').value.trim();
  const path = document.getElementById('ghPath').value.trim() || 'data/state.json';
  const branch = document.getElementById('ghBranch').value.trim() || 'main';
  const token = document.getElementById('ghToken').value.trim();
  const existing = loadGhSettings();
  saveGhSettings({owner, repo, path, branch, token: token || existing.token || ""});
  setSyncStatus("Connection details saved on this device.");
}

function hasGhConfig(){
  const cfg = loadGhSettings();
  return !!(cfg.owner && cfg.repo && cfg.token);
}

let isSyncing = false;

async function ghSyncNow(silent){
  const cfg = loadGhSettings();
  if(!cfg.owner || !cfg.repo || !cfg.token){
    if(!silent) setSyncStatus("Please fill in owner, repo, and token, then Save first.");
    return;
  }
  if(isSyncing) return;
  isSyncing = true;
  if(!silent) setSyncStatus("Saving to GitHub...");
  try{
    const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    let sha = undefined;
    const getRes = await fetch(`${api}?ref=${cfg.branch}`, {
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" }
    });
    if(getRes.ok){
      const getData = await getRes.json();
      sha = getData.sha;
    }
    const payload = JSON.stringify(state, null, 2);
    const content = btoa(unescape(encodeURIComponent(payload)));
    const putRes = await fetch(api, {
      method: "PUT",
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" },
      body: JSON.stringify({
        message: `Update Chore Quest data — ${new Date().toISOString()}`,
        content, sha, branch: cfg.branch
      })
    });
    if(!putRes.ok){
      const err = await putRes.json().catch(()=>({}));
      throw new Error(err.message || putRes.statusText);
    }
    lastSyncedJson = payload;
    setSyncStatus("Synced ✅ " + new Date().toLocaleTimeString());
  }catch(e){
    setSyncStatus("Sync failed: " + e.message);
  }
  isSyncing = false;
}

async function ghLoadLatest(silent){
  const cfg = loadGhSettings();
  if(!cfg.owner || !cfg.repo || !cfg.token){
    if(!silent) setSyncStatus("Please fill in owner, repo, and token, then Save first.");
    return;
  }
  if(isSyncing) return;
  isSyncing = true;
  if(!silent) setSyncStatus("Loading from GitHub...");
  try{
    const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    const res = await fetch(`${api}?ref=${cfg.branch}`, {
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" }
    });
    if(!res.ok) throw new Error("File not found yet in repo — Sync now to create it.");
    const data = await res.json();
    const json = decodeURIComponent(escape(atob(data.content)));
    if(json !== lastSyncedJson){
      state = JSON.parse(json);
      save();
      renderAll();
      lastSyncedJson = json;
      setSyncStatus("Updated from another device ✅ " + new Date().toLocaleTimeString());
    } else if(!silent){
      setSyncStatus("Already up to date ✅ " + new Date().toLocaleTimeString());
    }
  }catch(e){
    if(!silent) setSyncStatus("Load failed: " + e.message);
  }
  isSyncing = false;
}

/* ---------------- Auto-sync (debounced push + polling pull) ---------------- */
let lastSyncedJson = null;
let pushTimer = null;

function queueAutoPush(){
  if(!hasGhConfig()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => { ghSyncNow(true); }, 1200);
}

function startAutoPoll(){
  setInterval(() => {
    if(hasGhConfig() && !isSyncing) ghLoadLatest(true);
  }, 20000);
}

/* ---------------- Weather ---------------- */
const WEATHER_LOCATIONS = [
  { postcode: "2762", label: "Schofields", lat: -33.746, lon: 150.944 },
  { postcode: "2000", label: "Sydney", lat: -33.8688, lon: 151.2093 },
];

let weatherData = { loaded: false, loading: false, error: null, byPostcode: {} };

function weatherIcon(code){
  if(code === 0) return "☀️";
  if(code === 1 || code === 2) return "🌤️";
  if(code === 3) return "☁️";
  if(code === 45 || code === 48) return "🌫️";
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return "🌧️";
  if([71,73,75,77,85,86].includes(code)) return "❄️";
  if([95,96,99].includes(code)) return "⛈️";
  return "🌡️";
}
function isRainCode(code){
  return [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code);
}

const DAY_PERIODS = [
  { key: "morning", label: "Morning", hour: 9 },
  { key: "afternoon", label: "Afternoon", hour: 15 },
  { key: "evening", label: "Evening", hour: 19 },
  { key: "night", label: "Night", hour: 23 },
];

async function fetchWeather(){
  weatherData.loading = true;
  weatherData.error = null;
  try{
    const results = await Promise.all(WEATHER_LOCATIONS.map(async loc => {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
        `&hourly=temperature_2m,weathercode,precipitation_probability` +
        `&timezone=Australia%2FSydney&forecast_days=3`;
      const res = await fetch(url);
      if(!res.ok) throw new Error("Weather service unavailable");
      const data = await res.json();
      const times = data.hourly.time; // "YYYY-MM-DDTHH:00"
      const byDate = {};
      times.forEach((t, i) => {
        const [datePart, timePart] = t.split("T");
        const hour = parseInt(timePart.slice(0,2), 10);
        if(!byDate[datePart]) byDate[datePart] = {};
        byDate[datePart][hour] = {
          temp: Math.round(data.hourly.temperature_2m[i]),
          code: data.hourly.weathercode[i],
          rainChance: data.hourly.precipitation_probability[i],
        };
      });
      const dates = Object.keys(byDate).slice(0, 3);
      const days = dates.map(date => {
        const periods = DAY_PERIODS.map(p => byDate[date][p.hour] || null);
        return { date, periods };
      });
      return [loc.postcode, days];
    }));
    weatherData.byPostcode = Object.fromEntries(results);
    weatherData.loaded = true;
  }catch(e){
    weatherData.error = e.message;
  }
  weatherData.loading = false;
  const zone = document.getElementById('weatherZone');
  if(zone) zone.innerHTML = renderWeatherZoneHtml();
}

function dayLabel(dateStr, idx){
  if(idx === 0) return "Today";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString('en-AU', {weekday:'short'});
}

function renderWeatherZoneHtml(){
  if(weatherData.error){
    return `<div class="empty-state">Couldn't load weather right now. <span style="text-decoration:underline; cursor:pointer;" onclick="fetchWeather()">Try again</span></div>`;
  }
  if(!weatherData.loaded){
    return `<div class="empty-state">Loading forecast... 🌤️</div>`;
  }
  return `<div class="weather-row">
    ${WEATHER_LOCATIONS.map(loc => {
      const days = weatherData.byPostcode[loc.postcode] || [];
      const allPeriods = days.flatMap(d => d.periods).filter(Boolean);
      const anyCold = allPeriods.some(p => p.temp < 18);
      const anyRain = allPeriods.some(p => isRainCode(p.code) || p.rainChance >= 40);
      return `
        <div class="weather-card">
          <div class="weather-card-title">📍 ${loc.label}</div>
          <table class="weather-table">
            <thead>
              <tr>
                <th></th>
                ${days.map((d,i) => `<th>${dayLabel(d.date,i)}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${DAY_PERIODS.map((p, pi) => `
                <tr>
                  <td class="period-label">${p.label}</td>
                  ${days.map(d => {
                    const cell = d.periods[pi];
                    if(!cell) return `<td>–</td>`;
                    return `<td>${weatherIcon(cell.code)}<br>${cell.temp}°</td>`;
                  }).join('')}
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="weather-tips">
            ${anyCold ? '<span class="weather-tip">🧥 Wear a sweater</span>' : ''}
            ${anyRain ? '<span class="weather-tip">☂️ Carry an umbrella</span>' : ''}
            ${(!anyCold && !anyRain) ? '<span class="weather-tip">😎 Nice days ahead</span>' : ''}
          </div>
        </div>
      `;
    }).join('')}
  </div>`;
}
function todayKey(d = new Date()){
  return d.toISOString().slice(0,10);
}
function startOfWeek(d){
  const dt = new Date(d);
  const day = (dt.getDay() + 6) % 7; // Monday=0
  dt.setDate(dt.getDate() - day);
  dt.setHours(0,0,0,0);
  return dt;
}
function fmtKey(d){ return todayKey(d); }
const WEEK_DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

/* ---------------- Points / stats ---------------- */
function pointsForDay(dateKey){
  const rec = state.completions[dateKey] || {};
  let total = 0;
  state.tasks.forEach(t => { if(rec[t.id]) total += t.points; });
  return total;
}
function maxDailyPoints(){
  return state.tasks.reduce((s,t)=>s+t.points,0);
}
function isDayComplete(dateKey){
  const rec = state.completions[dateKey] || {};
  if(state.tasks.length === 0) return false;
  return state.tasks.every(t => rec[t.id]);
}
function computeStreak(){
  let streak = 0;
  let d = new Date();
  // if today isn't complete yet, start counting from yesterday (streak still "alive")
  if(!isDayComplete(todayKey(d))){
    d.setDate(d.getDate()-1);
  }
  while(isDayComplete(todayKey(d))){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function weeklyTotal(refDate = new Date()){
  const start = startOfWeek(refDate);
  let total = 0;
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    total += pointsForDay(fmtKey(d));
  }
  return total;
}
function monthlyTotal(year, month){
  let total = 0;
  const days = new Date(year, month+1, 0).getDate();
  for(let day=1; day<=days; day++){
    const d = new Date(year, month, day);
    total += pointsForDay(fmtKey(d));
  }
  return total;
}

/* ---------------- Rendering ---------------- */
let currentTab = "dashboard";
let monthCursor = new Date(); // for monthly nav

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('main > section').forEach(s=>s.classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  renderAll();
}

function renamePlayer(){
  const name = prompt("What's your name, adventurer?", state.player || "");
  if(name !== null){
    state.player = name.trim();
    save();
    renderHeader();
  }
}

function renderHeader(){
  document.getElementById('playerLabel').textContent = state.player ? state.player + "'s Mission Log" : "Tap to set name ✏️";
  const today = todayKey();
  document.getElementById('todayPtsLabel').textContent = pointsForDay(today) + " pts today";
}

function renderDashboard(){
  const el = document.getElementById('tab-dashboard');
  const today = todayKey();
  const rec = state.completions[today] || {};
  const doneCount = state.tasks.filter(t=>rec[t.id]).length;
  const totalToday = pointsForDay(today);
  const maxToday = maxDailyPoints();
  const pct = maxToday ? Math.round((totalToday/maxToday)*100) : 0;
  const level = Math.floor(totalToday/20) + 1;
  const streak = computeStreak();
  const wk = weeklyTotal();
  const now = new Date();
  const mo = monthlyTotal(now.getFullYear(), now.getMonth());

  const badges = [
    {emoji:"🌅", label:"Early Bird", on: doneCount >= 2},
    {emoji:"🔥", label:"5-Day Streak", on: streak >= 5},
    {emoji:"🧹", label:"Tidy Star", on: rec[state.tasks.find(t=>/tidy|room|clean/i.test(t.name))?.id] || false},
    {emoji:"✨", label:"Perfect Day", on: state.tasks.length>0 && doneCount === state.tasks.length},
  ];

  el.innerHTML = `
    <div class="hero-card">
      <div class="hero-top">
        <div>
          <div class="hero-label">Today's Progress</div>
          <div class="hero-big">${doneCount}/${state.tasks.length} <span>missions done</span></div>
        </div>
        <div class="level-badge">🏆 Lv ${level}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="hero-foot">${totalToday} / ${maxToday} points earned today</div>
    </div>
    <div class="stats-row">
      <div class="stat-card" style="background:#FFF1EA;"><div>🔥</div><div class="stat-value">${streak} days</div><div class="stat-label">Streak</div></div>
      <div class="stat-card" style="background:${'var(--blue-soft)'};"><div>🗓️</div><div class="stat-value">${wk} pts</div><div class="stat-label">This Week</div></div>
      <div class="stat-card" style="background:${'var(--green-soft)'};"><div>🏆</div><div class="stat-value">${mo} pts</div><div class="stat-label">This Month</div></div>
    </div>
    <div class="section-title">Badges Earned</div>
    <div class="badge-row">
      ${badges.map(b=>`
        <div class="badge ${b.on?'':'locked'}">
          <div class="badge-emoji">${b.emoji}</div>
          <div class="badge-label">${b.label}</div>
        </div>`).join('')}
    </div>
    <div class="section-title">Weather Insights</div>
    <div id="weatherZone">${renderWeatherZoneHtml()}</div>
  `;
  if(!weatherData.loaded && !weatherData.loading) fetchWeather();
}

function renderDaily(){
  const el = document.getElementById('tab-daily');
  const today = todayKey();
  const rec = state.completions[today] || {};

  let rows = state.tasks.map(t => `
    <div class="task-row ${rec[t.id]?'done':''}" onclick="toggleTask(${t.id})">
      <div class="task-icon">${t.icon}</div>
      <div style="flex:1;">
        <div class="task-name">${escapeHtml(t.name)}</div>
        <div class="task-meta">✨ ${t.points} pts</div>
      </div>
      <div class="task-points">+${t.points}</div>
      <div class="check-circle ${rec[t.id]?'done':''}">${rec[t.id]?'✓':''}</div>
    </div>
  `).join('');

  if(state.tasks.length === 0){
    rows = `<div class="empty-state">No missions yet — add your first chore below! 👇</div>`;
  }

  el.innerHTML = `
    <div class="section-title">Today's Missions</div>
    <div style="margin-top:10px;">${rows}</div>
    <div id="parentZone"></div>
  `;

  renderParentZone();
}

function renderParentZone(){
  const zone = document.getElementById('parentZone');
  if(!zone) return;

  if(mode !== "parent"){
    zone.innerHTML = `
      <div style="text-align:center; margin-top:22px;">
        <div class="empty-state" style="padding-top:0;">Switch to Parent Mode (top right) to add or edit missions.</div>
      </div>
    `;
    return;
  }

  const cfg = loadGhSettings();

  zone.innerHTML = `
    <div class="admin-banner">
      <div class="admin-banner-title">🛠️ ADMIN</div>
      <ol>
        <li>Add, rename, re-point, or delete missions below — kids only see the checklist.</li>
        <li>Changes save to this device instantly.</li>
        <li>To back up or share progress, fill in the GitHub section and tap <b>Sync now</b>.</li>
        <li>Tap <b>🔓 Parent Mode</b> in the header again to switch back to Kid Mode.</li>
      </ol>
    </div>
    <div class="section-title">Manage Missions</div>
    <div id="manageList" style="margin-top:8px;"></div>
    <button class="add-btn" onclick="addTaskPrompt()">+ Add a new mission</button>

    <div class="section-title">Sync Across Devices</div>
    <div class="sync-box">
      <div style="font-size:11.5px; color:var(--ink-soft); font-weight:600; margin-bottom:4px;">
        Once connected, this device auto-syncs every ~20s — no need to tap the buttons unless you want to force it.
      </div>
      <label>Repo owner</label>
      <input type="text" id="ghOwner" value="${escapeAttr(cfg.owner || 'hello20jacqui-bot')}">
      <label>Repository name</label>
      <input type="text" id="ghRepo" value="${escapeAttr(cfg.repo || 'chore-quest')}">
      <label>File path in repo</label>
      <input type="text" id="ghPath" value="${escapeAttr(cfg.path || 'data/state.json')}">
      <label>Branch</label>
      <input type="text" id="ghBranch" value="${escapeAttr(cfg.branch || 'main')}">
      <label>Personal access token (kept only on this device)</label>
      <input type="password" id="ghToken" placeholder="${cfg.token ? '•••• saved — leave blank to keep' : 'ghp_...'}">
      <div class="sync-actions">
        <button class="sync-save" onclick="saveGhFromForm()">Save connection</button>
        <button onclick="ghSyncNow()">Sync now</button>
        <button onclick="ghLoadLatest()">Load latest</button>
      </div>
      <div class="sync-status" id="syncStatus"></div>
    </div>
  `;

  document.getElementById('manageList').innerHTML = state.tasks.map(t => `
    <div class="settings-row">
      <span style="font-size:18px;">${t.icon}</span>
      <input type="text" value="${escapeAttr(t.name)}" onchange="updateTaskName(${t.id}, this.value)">
      <input type="number" min="0" step="5" value="${t.points}" onchange="updateTaskPoints(${t.id}, this.value)">
      <button class="icon-btn" title="Delete" onclick="deleteTask(${t.id})">🗑️</button>
    </div>
  `).join('');
}

function renderWeekly(){
  const el = document.getElementById('tab-weekly');
  const start = startOfWeek(new Date());
  const days = [];
  for(let i=0;i<7;i++){ const d=new Date(start); d.setDate(start.getDate()+i); days.push(d); }

  const rowsHtml = state.tasks.map(t => {
    const cells = days.map(d => {
      const rec = state.completions[fmtKey(d)] || {};
      const on = !!rec[t.id];
      return `<td><div class="dot ${on?'on':''}">${on?'✓':''}</div></td>`;
    }).join('');
    return `<tr><td class="name">${t.icon} ${escapeHtml(t.name)}</td>${cells}</tr>`;
  }).join('');

  const total = weeklyTotal();
  const streak = computeStreak();

  el.innerHTML = `
    <div class="section-title">This Week</div>
    <div style="overflow-x:auto;">
      <table class="grid">
        <thead><tr><th></th>${WEEK_DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
        <tbody>${rowsHtml || `<tr><td class="empty-state" colspan="8">Add missions on the Daily tab to see them here.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="banner">${total} points earned this week · 🔥 ${streak}-day streak</div>
  `;
}

function renderMonthly(){
  const el = document.getElementById('tab-monthly');
  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const monthName = monthCursor.toLocaleString('default', {month:'long', year:'numeric'});
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Monday=0

  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let day=1; day<=daysInMonth; day++) cells.push(day);
  while(cells.length % 7 !== 0) cells.push(null);

  let heat = '<div class="heat-wrap">';
  for(let i=0;i<cells.length;i+=7){
    heat += '<div class="heat-row">';
    for(let j=i;j<i+7;j++){
      const day = cells[j];
      if(day === null){ heat += `<div class="heat-cell" style="background:transparent;"></div>`; continue; }
      const d = new Date(year, month, day);
      const max = maxDailyPoints();
      const pts = pointsForDay(fmtKey(d));
      const ratio = max ? pts/max : 0;
      const bg = ratio === 0 ? '#EFECE3' : ratio < 0.5 ? '#BEE8CD' : ratio < 1 ? '#6FCB93' : '#2FA36B';
      heat += `<div class="heat-cell" title="${fmtKey(d)}: ${pts} pts" style="background:${bg};"></div>`;
    }
    heat += '</div>';
  }
  heat += '</div>';

  const total = monthlyTotal(year, month);
  let bestStreak = 0, run = 0;
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(year, month, day);
    if(isDayComplete(fmtKey(d))){ run++; bestStreak = Math.max(bestStreak, run); } else { run = 0; }
  }
  const maxPossible = maxDailyPoints() * daysInMonth;
  const completion = maxPossible ? Math.round((total/maxPossible)*100) : 0;

  el.innerHTML = `
    <div class="month-nav">
      <button onclick="shiftMonth(-1)">‹</button>
      <div class="section-title" style="margin-top:0;">${monthName}</div>
      <button onclick="shiftMonth(1)">›</button>
    </div>
    ${heat}
    <div class="stats-row">
      <div class="stat-card" style="background:var(--green-soft);"><div>🏆</div><div class="stat-value">${total}</div><div class="stat-label">Total Points</div></div>
      <div class="stat-card" style="background:#FFF1EA;"><div>🔥</div><div class="stat-value">${bestStreak} days</div><div class="stat-label">Best Streak</div></div>
      <div class="stat-card" style="background:var(--blue-soft);"><div>⭐</div><div class="stat-value">${completion}%</div><div class="stat-label">Completion</div></div>
    </div>
  `;
}

function shiftMonth(delta){
  monthCursor.setMonth(monthCursor.getMonth()+delta);
  renderMonthly();
}

function renderAll(){
  renderHeader();
  updateModeButton();
  if(currentTab==='dashboard') renderDashboard();
  if(currentTab==='daily') renderDaily();
  if(currentTab==='weekly') renderWeekly();
  if(currentTab==='monthly') renderMonthly();
}

/* ---------------- Actions ---------------- */
function toggleTask(id){
  const today = todayKey();
  if(!state.completions[today]) state.completions[today] = {};
  state.completions[today][id] = !state.completions[today][id];
  save();
  renderAll();
  queueAutoPush();
}

const ICONS = ["🛏️","🦷","🐶","🎒","📚","🧸","🧹","🍽️","🚿","👕","🌱","📦","🥣","🧦","🚮","⚽"];
function addTaskPrompt(){
  const name = prompt("What's the new mission called?");
  if(!name) return;
  const pointsStr = prompt("How many points is it worth?", "10");
  const points = Math.max(0, parseInt(pointsStr,10) || 10);
  const icon = ICONS[Math.floor(Math.random()*ICONS.length)];
  state.tasks.push({id: state.nextTaskId++, name: name.trim(), icon, points});
  save();
  renderAll();
  queueAutoPush();
}
function updateTaskName(id, value){
  const t = state.tasks.find(t=>t.id===id);
  if(t){ t.name = value.trim() || t.name; save(); renderAll(); queueAutoPush(); }
}
function updateTaskPoints(id, value){
  const t = state.tasks.find(t=>t.id===id);
  if(t){ t.points = Math.max(0, parseInt(value,10) || 0); save(); renderAll(); queueAutoPush(); }
}
function deleteTask(id){
  if(!confirm("Remove this mission? Past history stays on the calendar.")) return;
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save();
  renderAll();
  queueAutoPush();
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ---------------- Cross-tab (same device) live update ---------------- */
window.addEventListener('storage', (e) => {
  if(e.key === STORE_KEY && e.newValue){
    try{
      state = JSON.parse(e.newValue);
      renderAll();
    }catch(err){}
  }
});

/* ---------------- Init ---------------- */
renderAll();
if(hasGhConfig()){
  ghLoadLatest(true).then(startAutoPoll);
} else {
  startAutoPoll();
}
</script>
</body>
