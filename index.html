<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Chore Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF3E8; --panel:#FFFFFF; --border:#F3D9B8; --tabbg:#FBEEDD;
    --ink:#2E2438; --ink-soft:#5C4A6B; --muted:#9C8FA8;
    --accent1:#FFB454; --accent2:#FF7A6B; --orange:#FF6B35;
    --green:#22B07D; --green-soft:#E4F9EF; --blue:#4C7EF3; --blue-soft:#EAF0FF;
    --purple1:#4A3B7A; --purple2:#7A5FC9; --gold:#FFCB3D;
    --glass:rgba(255,255,255,.62); --glass-strong:rgba(255,255,255,.85);
    --shadow-sm:0 2px 8px rgba(46,36,56,.08);
    --shadow-md:0 8px 24px rgba(46,36,56,.12);
    --shadow-lg:0 20px 48px rgba(46,36,56,.18);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(255,180,84,.35), transparent 45%),
      radial-gradient(circle at 90% 0%, rgba(122,95,201,.28), transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(34,176,125,.18), transparent 40%),
      linear-gradient(180deg,var(--cream) 0%,#FFEFE0 60%,#FFF6EC 100%);
    background-attachment:fixed;
    font-family:'Nunito',sans-serif; color:var(--ink);
    padding:20px 16px; display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .frame{
    width:100%; max-width:480px; background:var(--panel);
    border-radius:32px; box-shadow:var(--shadow-lg), 0 1px 0 rgba(255,255,255,.6) inset;
    overflow:hidden; border:1px solid rgba(255,255,255,.7);
    backdrop-filter:blur(20px);
    animation:frameIn .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes frameIn{ from{opacity:0; transform:translateY(10px) scale(.99);} to{opacity:1; transform:none;} }

  header{
    position:relative; display:flex; align-items:center; justify-content:space-between;
    padding:20px 20px 16px;
    background:linear-gradient(125deg,var(--accent1) 0%,var(--accent2) 55%,#FF6E9C 100%);
    overflow:hidden;
  }
  header::after{
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 85% -20%, rgba(255,255,255,.45), transparent 55%);
    pointer-events:none;
  }
  .header-left{display:flex; align-items:center; gap:11px; position:relative; z-index:1;}
  .mascot{width:46px; height:46px; border-radius:16px; background:rgba(255,255,255,.4);
    display:flex; align-items:center; justify-content:center; font-size:23px;
    box-shadow:0 4px 14px rgba(0,0,0,.1), 0 1px 0 rgba(255,255,255,.5) inset;}
  .app-name{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:20px; letter-spacing:-.2px; text-shadow:0 1px 2px rgba(0,0,0,.05);}
  .app-sub{font-size:12.5px; color:rgba(46,36,56,.75); font-weight:700; cursor:pointer;}
  .points-pill{display:flex; align-items:center; background:var(--glass-strong);
    padding:7px 13px; border-radius:999px; font-weight:800; font-size:13px; color:var(--purple1); gap:6px; white-space:nowrap;
    box-shadow:var(--shadow-sm), 0 1px 0 rgba(255,255,255,.8) inset; position:relative; z-index:1;}

  nav{display:flex; gap:5px; padding:12px; background:var(--tabbg); border-bottom:1px solid var(--border); position:relative;}
  nav button{flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
    padding:10px 4px; border-radius:14px; border:none; background:transparent;
    color:#9A7F5C; font-weight:700; font-size:12px; cursor:pointer; font-family:'Nunito',sans-serif;
    transition:all .2s cubic-bezier(.4,0,.2,1);}
  nav button.active{background:#fff; color:var(--orange); box-shadow:var(--shadow-sm); transform:translateY(-1px);}
  nav button:active{transform:scale(.96);}
  main{padding:20px 18px 26px;}
  .hidden{display:none !important;}

  .hero-card{
    position:relative; overflow:hidden;
    background:linear-gradient(150deg,var(--purple1) 0%,var(--purple2) 100%);
    border-radius:24px; padding:20px; color:#fff;
    box-shadow:var(--shadow-md), 0 1px 0 rgba(255,255,255,.15) inset;
  }
  .hero-card::before{
    content:''; position:absolute; width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.18), transparent 70%);
    top:-90px; right:-60px;
  }
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
  .hero-label{font-size:11.5px; opacity:.78; font-weight:800; text-transform:uppercase; letter-spacing:.8px;}
  .hero-big{font-family:'Baloo 2',sans-serif; font-size:27px; font-weight:800; margin-top:3px; letter-spacing:-.3px;}
  .hero-big span{font-size:13px; font-weight:600; opacity:.72;}
  .level-badge{display:flex; align-items:center; gap:4px; background:linear-gradient(135deg,var(--gold),#FFA53D); color:var(--purple1);
    padding:7px 13px; border-radius:999px; font-size:13px; font-weight:800; white-space:nowrap; box-shadow:0 4px 10px rgba(255,177,61,.4);}
  .progress-track{height:13px; background:rgba(255,255,255,.16); border-radius:999px; margin-top:18px; overflow:hidden; position:relative; z-index:1;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--gold),var(--accent2)); border-radius:999px; transition:width .5s cubic-bezier(.4,0,.2,1); position:relative; box-shadow:0 0 12px rgba(255,203,61,.6);}
  .hero-foot{margin-top:9px; font-size:12.5px; opacity:.85; font-weight:600; position:relative; z-index:1;}

  .stats-row{display:flex; gap:10px; margin-top:16px;}
  .stat-card{flex:1; border-radius:18px; padding:16px 8px; display:flex; flex-direction:column; align-items:center; gap:5px;
    box-shadow:var(--shadow-sm); transition:transform .2s;}
  .stat-card:active{transform:scale(.97);}
  .stat-value{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:16.5px;}
  .stat-label{font-size:10.5px; color:#7A6A55; font-weight:700; text-align:center;}

  .section-title{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15.5px; margin-top:24px; letter-spacing:-.1px;}
  .badge-row{display:flex; gap:11px; margin-top:11px; overflow-x:auto; padding-bottom:2px;}
  .badge{display:flex; flex-direction:column; align-items:center; min-width:66px;}
  .badge-emoji{width:56px; height:56px; border-radius:18px; background:linear-gradient(155deg,#FFF6E6,#FFEBC7);
    display:flex; align-items:center; justify-content:center; font-size:27px; box-shadow:var(--shadow-sm), 0 1px 0 rgba(255,255,255,.6) inset;}
  .badge-label{font-size:10px; font-weight:700; color:#8A7860; text-align:center; margin-top:6px; line-height:1.2;}
  .badge.locked{opacity:.32;}
  .badge.locked .badge-emoji{background:#F2EDE4; box-shadow:none;}

  .task-row{display:flex; align-items:center; gap:12px; padding:13px 15px; background:#FBF8F3;
    border-radius:18px; cursor:pointer; border:2px solid transparent; transition:all .18s cubic-bezier(.4,0,.2,1); margin-bottom:10px;
    box-shadow:0 1px 2px rgba(46,36,56,.04);}
  .task-row:active{transform:scale(.98);}
  .task-row.done{background:linear-gradient(135deg,#EEFBF4,#E4F9EF); border-color:#B9EDD1;}
  .task-icon{font-size:25px; width:38px; text-align:center;}
  .task-name{font-weight:700; font-size:14.5px;}
  .task-row.done .task-name{text-decoration:line-through; opacity:.55;}
  .task-meta{display:flex; align-items:center; font-size:11px; color:var(--muted); margin-top:2px; gap:4px;}
  .task-points{font-weight:800; color:#FF8A00; font-size:13px; white-space:nowrap;}
  .check-circle{width:27px; height:27px; border-radius:50%; border:2.5px solid #DDD3E2;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s;}
  .check-circle.done{background:linear-gradient(135deg,var(--green),#1C9A6C); border-color:transparent; box-shadow:0 3px 8px rgba(34,176,125,.4);}
  .empty-state{text-align:center; padding:32px 10px; color:var(--muted); font-weight:600; font-size:13px;}

  table.grid{border-collapse:collapse; width:100%; margin-top:12px;}
  table.grid th{font-size:10.5px; color:var(--muted); font-weight:700; padding-bottom:6px;}
  table.grid td{text-align:center; padding:3px;}
  table.grid td.name{font-size:11px; font-weight:700; color:var(--ink-soft); text-align:left; white-space:nowrap; padding-right:6px;}
  .dot{width:23px; height:23px; border-radius:8px; display:flex; align-items:center; justify-content:center; margin:0 auto; background:#F1ECE2; transition:all .2s;}
  .dot.on{background:linear-gradient(135deg,var(--green),#1C9A6C); box-shadow:0 2px 6px rgba(34,176,125,.35);}

  .banner{margin-top:18px; background:linear-gradient(135deg,#FFF1DA,#FFE8C4); border-radius:16px; padding:13px 15px; font-weight:700; font-size:12.5px; color:#8A5A20; text-align:center; box-shadow:var(--shadow-sm);}

  .heat-wrap{display:flex; flex-direction:column; gap:5px; margin-top:12px;}
  .heat-row{display:flex; gap:5px;}
  .heat-cell{flex:1; aspect-ratio:1; border-radius:7px; background:#EFECE3; transition:transform .15s;}

  select, input[type=number], input[type=text], input[type=password]{
    font-family:'Nunito',sans-serif; border:2px solid var(--border); border-radius:12px; padding:8px 11px; font-size:13px; font-weight:600; color:var(--ink);
    background:#fff; transition:border-color .15s;
  }
  select:focus, input:focus{ outline:none; border-color:var(--purple2); }

  .settings-row{display:flex; gap:8px; align-items:center; margin-bottom:10px; background:#FBF8F3; padding:11px 13px; border-radius:16px; box-shadow:0 1px 2px rgba(46,36,56,.04);}
  .settings-row input[type=text]{flex:2; min-width:0;}
  .settings-row input[type=number]{width:64px;}
  .icon-btn{background:none; border:none; cursor:pointer; font-size:18px; padding:4px; transition:transform .15s;}
  .icon-btn:active{transform:scale(.85);}
  .add-btn{width:100%; margin-top:8px; padding:13px; border-radius:16px; border:2px dashed var(--border);
    background:transparent; color:var(--orange); font-weight:800; font-size:13px; cursor:pointer; transition:all .15s;}
  .add-btn:active{transform:scale(.98); background:rgba(255,107,53,.06);}

  .sync-cta{
    width:100%; margin-top:16px; padding:15px; border-radius:18px; border:none; cursor:pointer;
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px; color:#fff;
    background:linear-gradient(135deg,var(--green) 0%,#1C9A6C 100%);
    box-shadow:0 10px 24px rgba(34,176,125,.35), 0 1px 0 rgba(255,255,255,.25) inset;
    transition:all .18s cubic-bezier(.4,0,.2,1); letter-spacing:.2px;
  }
  .sync-cta:active{ transform:scale(.97); box-shadow:0 4px 12px rgba(34,176,125,.3); }
  .sync-cta:disabled{ opacity:.7; cursor:default; }

  .month-nav{display:flex; align-items:center; justify-content:space-between; margin-top:24px;}
  .month-nav button{background:#FBF8F3; border:none; border-radius:12px; width:34px; height:34px; font-size:16px; cursor:pointer; font-weight:800; color:var(--ink-soft); box-shadow:var(--shadow-sm);}
  .icon-picker{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;}
  .icon-picker span{font-size:20px; padding:4px 6px; border-radius:8px; cursor:pointer;}
  .icon-picker span.sel{background:#FFE3B3;}

  .mode-toggle{border:none; border-radius:999px; padding:7px 13px; font-weight:800; font-size:12px;
    cursor:pointer; background:var(--glass-strong); color:var(--purple1); white-space:nowrap; font-family:'Nunito',sans-serif;
    box-shadow:var(--shadow-sm); transition:all .2s;}
  .mode-toggle.parent{background:linear-gradient(135deg,var(--purple1),var(--purple2)); color:#fff; box-shadow:0 4px 12px rgba(74,59,122,.4);}
  .mode-toggle:active{transform:scale(.95);}

  .sync-box{background:linear-gradient(160deg,#FBF8F3,#F5F0E7); border-radius:18px; padding:14px 15px; margin-top:11px; box-shadow:var(--shadow-sm);}
  .sync-box label{font-size:11px; font-weight:700; color:var(--muted); display:block; margin:7px 0 3px;}
  .sync-box input[type=text], .sync-box input[type=password]{width:100%;}
  .sync-actions{display:flex; gap:8px; margin-top:11px;}
  .sync-actions button{flex:1; padding:10px; border-radius:12px; border:none; font-weight:800; font-size:12px; cursor:pointer; transition:transform .15s;}
  .sync-actions button:active{transform:scale(.96);}
  .sync-save{background:linear-gradient(135deg,var(--purple1),var(--purple2)); color:#fff; box-shadow:0 4px 10px rgba(74,59,122,.3);}
  .sync-status{font-size:11.5px; color:var(--muted); margin-top:9px; font-weight:600; min-height:14px;}

  .weather-row{display:flex; gap:10px; margin-top:11px;}
  .weather-card{flex:1; background:linear-gradient(160deg,#FBF8F3,#F6F1E8); border-radius:18px; padding:13px; min-width:0; box-shadow:var(--shadow-sm);}
  .weather-card-title{font-weight:800; font-size:12.5px; color:var(--ink-soft); margin-bottom:9px; display:flex; align-items:center; gap:5px;}
  table.weather-table{width:100%; border-collapse:collapse;}
  table.weather-table th{font-size:10px; color:var(--muted); font-weight:700; padding-bottom:4px;}
  table.weather-table td{text-align:center; font-size:11px; font-weight:700; color:var(--ink); padding:5px 2px; border-top:1px solid #EFE6D3; line-height:1.3;}
  table.weather-table td.period-label{text-align:left; font-size:10.5px; font-weight:700; color:var(--ink-soft); white-space:nowrap;}
  .weather-tips{display:flex; gap:6px; margin-top:11px; flex-wrap:wrap;}
  .weather-tip{font-size:10.5px; font-weight:700; background:linear-gradient(135deg,#FFF1DA,#FFE8C4); color:#8A5A20; padding:4px 10px; border-radius:999px; box-shadow:0 1px 2px rgba(0,0,0,.04);}

  .admin-banner{
    position:relative; overflow:hidden;
    background:linear-gradient(140deg,var(--purple1) 0%,var(--purple2) 100%);
    border-radius:18px; padding:15px 17px; color:#fff; margin-top:8px; box-shadow:var(--shadow-md);
  }
  .admin-banner::after{ content:''; position:absolute; inset:0; background:radial-gradient(circle at 90% 0%, rgba(255,255,255,.15), transparent 60%); }
  .admin-banner-title{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:15px; display:flex; align-items:center; gap:6px; position:relative; z-index:1;}
  .admin-banner ol{margin:9px 0 0; padding-left:19px; font-size:12px; line-height:1.65; opacity:.92; position:relative; z-index:1;}
  .admin-banner li{margin-bottom:3px;}
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="header-left">
      <div class="mascot">🚀</div>
      <div>
        <div class="app-name">Chore Quest</div>
        <div class="app-sub" id="playerLabel" onclick="renamePlayer()">Tap to set name ✏️</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="modeToggle" class="mode-toggle" onclick="toggleMode()">🧒 Kid Mode</button>
      <div class="points-pill">⭐ <span id="todayPtsLabel">0 pts today</span></div>
    </div>
  </header>

  <nav>
    <button data-tab="dashboard" class="active" onclick="switchTab('dashboard')">☀️ Dashboard</button>
    <button data-tab="daily" onclick="switchTab('daily')">📅 Daily</button>
    <button data-tab="weekly" onclick="switchTab('weekly')">🗓️ Weekly</button>
    <button data-tab="monthly" onclick="switchTab('monthly')">🏆 Monthly</button>
  </nav>

  <main>
    <section id="tab-dashboard"></section>
    <section id="tab-daily" class="hidden"></section>
    <section id="tab-weekly" class="hidden"></section>
    <section id="tab-monthly" class="hidden"></section>
  </main>
</div>

<script>
/* ---------------- Storage ---------------- */
const STORE_KEY = "chore-quest-v1";

function loadState(){
  const raw = localStorage.getItem(STORE_KEY);
  if(raw){
    try{ return JSON.parse(raw); }catch(e){}
  }
  // default starter state
  return {
    player: "",
    tasks: [
      {id:1, name:"Make bed", icon:"🛏️", points:10},
      {id:2, name:"Brush teeth", icon:"🦷", points:10},
      {id:3, name:"Feed the pet", icon:"🐶", points:15},
      {id:4, name:"Pack school bag", icon:"🎒", points:10},
      {id:5, name:"Homework", icon:"📚", points:25},
      {id:6, name:"Tidy room", icon:"🧸", points:20},
    ],
    nextTaskId: 7,
    // completions: { "YYYY-MM-DD": { taskId: true } }
    completions: {}
  };
}
let state = loadState();
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

/* Tracks the last state JSON we know is confirmed saved in GitHub, persisted so it
   survives a page reload — this is how we detect "local has changes GitHub doesn't have yet". */
const SYNCED_KEY = "chore-quest-v1-synced";
function getSyncedJson(){ return localStorage.getItem(SYNCED_KEY); }
function markSynced(json){ localStorage.setItem(SYNCED_KEY, json); lastSyncedJson = json; }
function hasUnsyncedChanges(){ return JSON.stringify(state) !== getSyncedJson(); }

/* ---------------- Parent PIN & Mode ---------------- */
const PARENT_PIN = "1300"; // hardcoded parent PIN
let mode = "kid"; // 'kid' | 'parent'

function toggleMode(){
  if(mode === "parent"){
    mode = "kid";
    updateModeButton();
    renderAll();
    return;
  }
  const attempt = prompt("Enter parent PIN to switch to Parent Mode:");
  if(attempt === null) return;
  if(attempt.trim() === PARENT_PIN){
    mode = "parent";
    updateModeButton();
    renderAll();
  } else {
    alert("Incorrect PIN.");
  }
}

function updateModeButton(){
  const btn = document.getElementById('modeToggle');
  if(!btn) return;
  btn.textContent = mode === "parent" ? "🔓 Parent Mode" : "🧒 Kid Mode";
  btn.classList.toggle('parent', mode === "parent");
}

/* ---------------- GitHub Sync ---------------- */
const GH_KEY = "chore-quest-gh-settings";
function loadGhSettings(){
  try{ return JSON.parse(localStorage.getItem(GH_KEY)) || {}; }catch(e){ return {}; }
}
function saveGhSettings(s){ localStorage.setItem(GH_KEY, JSON.stringify(s)); }

function saveGhFromForm(){
  const owner = document.getElementById('ghOwner').value.trim();
  const repo = document.getElementById('ghRepo').value.trim();
  const path = document.getElementById('ghPath').value.trim() || 'data/state.json';
  const branch = document.getElementById('ghBranch').value.trim() || 'main';
  const token = document.getElementById('ghToken').value.trim();
  const existing = loadGhSettings();
  saveGhSettings({owner, repo, path, branch, token: token || existing.token || ""});
  setSyncStatus("Connection details saved on this device.");
}

function hasGhConfig(){
  const cfg = loadGhSettings();
  return !!(cfg.owner && cfg.repo && cfg.token);
}

/* Wraps fetch with a hard timeout so a stalled connection (flaky wifi, blocked
   request, etc.) can never leave a sync stuck "in progress" forever. */
function fetchWithTimeout(url, options, ms = 10000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
}

/* ---------------- Device identity ---------------- */
const DEVICE_ID_KEY = "chore-quest-device-id";
function getDeviceId(){
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if(!id){
    id = (crypto.randomUUID ? crypto.randomUUID() : ("dev-" + Math.random().toString(36).slice(2) + Date.now()));
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}

/* ---------------- Cross-device sync lock ----------------
   Only one device may push/pull at a time. Implemented as a small lock file
   in the same repo, written/read via the GitHub Contents API. A lock older
   than LOCK_TTL_MS is considered abandoned (e.g. the holder's tab crashed or
   lost network mid-sync) and can be taken over, so the app can never
   permanently deadlock.

   Exposed as pure-ish functions (cfg + deviceId + fetchFn passed in) so the
   exact same logic can be exercised in an automated test with a mocked
   fetchFn instead of the real network. */
const LOCK_TTL_MS = 20000;

function lockPathFor(dataPath){
  const parts = dataPath.split('/');
  parts[parts.length - 1] = 'sync.lock.json';
  return parts.join('/');
}

async function ghGetFile(cfg, path, fetchFn){
  const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const res = await fetchFn(`${api}?ref=${cfg.branch}`, {
    headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" }
  });
  if(res.status === 404) return { exists: false };
  if(!res.ok) throw new Error(`GET ${path} failed: ${res.status}`);
  const data = await res.json();
  return { exists: true, sha: data.sha, json: JSON.parse(decodeURIComponent(escape(atob(data.content)))) };
}

async function ghPutFile(cfg, path, obj, sha, fetchFn){
  const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(obj, null, 2))));
  const res = await fetchFn(api, {
    method: "PUT",
    headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" },
    body: JSON.stringify({ message: `Chore Quest sync — ${new Date().toISOString()}`, content, sha, branch: cfg.branch })
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    const e = new Error(err.message || `PUT ${path} failed: ${res.status}`);
    e.status = res.status;
    throw e;
  }
  return res;
}

async function ghDeleteFile(cfg, path, sha, fetchFn){
  const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  await fetchFn(api, {
    method: "DELETE",
    headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" },
    body: JSON.stringify({ message: `Chore Quest sync lock release — ${new Date().toISOString()}`, sha, branch: cfg.branch })
  }).catch(()=>{}); // best-effort — a failed release is recovered from via TTL expiry
}

/* Returns { acquired: true } or { acquired: false, reason }. Never throws —
   any network problem is treated as "couldn't acquire, try again". */
async function acquireLock(cfg, deviceId, fetchFn = fetch, now = () => Date.now()){
  const path = lockPathFor(cfg.path);
  try{
    const existing = await ghGetFile(cfg, path, fetchFn);
    if(!existing.exists){
      // No lock file yet — try to create it. sha-guarded (undefined = "must
      // not already exist"), so if another device creates it first, this
      // PUT fails with a conflict instead of silently double-acquiring.
      try{
        await ghPutFile(cfg, path, { owner: deviceId, ts: now() }, undefined, fetchFn);
        return { acquired: true };
      }catch(e){
        return { acquired: false, reason: "race" };
      }
    }
    const lock = existing.json;
    if(lock.owner === deviceId){
      // Re-entrant: refresh our own lock's timestamp.
      await ghPutFile(cfg, path, { owner: deviceId, ts: now() }, existing.sha, fetchFn);
      return { acquired: true };
    }
    const age = now() - lock.ts;
    if(age <= LOCK_TTL_MS){
      return { acquired: false, reason: "locked" };
    }
    // Stale lock — attempt takeover. sha-guarded, so if another device takes
    // over first, this PUT will fail with a conflict and we back off cleanly.
    try{
      await ghPutFile(cfg, path, { owner: deviceId, ts: now() }, existing.sha, fetchFn);
      return { acquired: true };
    }catch(e){
      return { acquired: false, reason: "race" };
    }
  }catch(e){
    return { acquired: false, reason: "network" };
  }
}

async function releaseLock(cfg, deviceId, fetchFn = fetch){
  const path = lockPathFor(cfg.path);
  try{
    const existing = await ghGetFile(cfg, path, fetchFn);
    if(existing.exists && existing.json.owner === deviceId){
      await ghDeleteFile(cfg, path, existing.sha, fetchFn);
    }
  }catch(e){ /* best-effort */ }
}

let isSyncing = false;

/* Low-level push/pull — assume the caller already holds the lock. */
async function ghSyncNow(silent){
  const cfg = loadGhSettings();
  try{
    const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    let sha = undefined;
    const getRes = await fetchWithTimeout(`${api}?ref=${cfg.branch}`, {
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" }
    });
    if(getRes.ok){
      const getData = await getRes.json();
      sha = getData.sha;
    }
    const payload = JSON.stringify(state, null, 2);
    const content = btoa(unescape(encodeURIComponent(payload)));
    const putRes = await fetchWithTimeout(api, {
      method: "PUT",
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" },
      body: JSON.stringify({
        message: `Update Chore Quest data — ${new Date().toISOString()}`,
        content, sha, branch: cfg.branch
      })
    });
    if(!putRes.ok){
      const err = await putRes.json().catch(()=>({}));
      throw new Error(err.message || putRes.statusText);
    }
    markSynced(payload);
    if(!silent) setSyncStatus("Synced ✅ " + new Date().toLocaleTimeString());
  }catch(e){
    if(!silent) setSyncStatus("Sync failed: " + e.message);
    throw e;
  }
}

async function ghLoadLatest(silent){
  const cfg = loadGhSettings();
  try{
    const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    const res = await fetchWithTimeout(`${api}?ref=${cfg.branch}`, {
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" }
    });
    if(!res.ok) throw new Error("File not found yet in repo — Sync to create it.");
    const data = await res.json();
    const json = decodeURIComponent(escape(atob(data.content)));
    if(hasUnsyncedChanges()){
      await ghSyncNow(silent);
      return;
    }
    if(json !== lastSyncedJson){
      state = JSON.parse(json);
      save();
      renderAll();
      markSynced(json);
      if(!silent) setSyncStatus("Updated from another device ✅ " + new Date().toLocaleTimeString());
    } else if(!silent){
      setSyncStatus("Already up to date ✅ " + new Date().toLocaleTimeString());
    }
  }catch(e){
    if(!silent) setSyncStatus("Load failed: " + e.message);
    throw e;
  }
}

/* Everything that talks to GitHub goes through this — acquires the lock,
   does the work, always releases (even on error), and reports whether it
   actually ran or was blocked by another device. */
async function withSyncLock(work, { silent = true } = {}){
  if(!hasGhConfig()){
    if(!silent) setSyncStatus("Please fill in owner, repo, and token, then Save first.");
    return { ok: false, reason: "no-config" };
  }
  if(isSyncing) return { ok: false, reason: "local-busy" };
  isSyncing = true;
  const cfg = loadGhSettings();
  const deviceId = getDeviceId();
  try{
    const lock = await acquireLock(cfg, deviceId);
    if(!lock.acquired){
      if(!silent) setSyncStatus("🔁 Retry — another device is syncing right now.");
      return { ok: false, reason: "locked" };
    }
    try{
      await work();
      return { ok: true };
    } finally {
      await releaseLock(cfg, deviceId);
    }
  }catch(e){
    if(!silent) setSyncStatus("Sync failed: " + (e.message || "unknown error"));
    return { ok: false, reason: "error", error: e };
  } finally {
    isSyncing = false;
  }
}

/* ---------------- Auto-sync (debounced push + polling pull) ---------------- */
let lastSyncedJson = null;
let pushTimer = null;

function queueAutoPush(){
  if(!hasGhConfig()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => {
    withSyncLock(() => ghSyncNow(true), { silent: true });
  }, 500);
}

function startAutoPoll(){
  setInterval(() => {
    withSyncLock(() => ghLoadLatest(true), { silent: true });
  }, 5000);
}

/* Manual "Sync" action — push this device's changes, then pull anything new.
   Locked so it can never run concurrently with another device's sync. */
async function syncNow(){
  const result = await withSyncLock(async () => {
    setSyncStatus("Syncing — pushing this device's changes...");
    await ghSyncNow(true);
    setSyncStatus("Pulling the latest from GitHub...");
    await ghLoadLatest(true);
    setSyncStatus("Synced ✅ " + new Date().toLocaleTimeString());
  }, { silent: false });
  return result;
}

/* Wipes this device's saved data and connection cache so the next load pulls a
   clean copy from GitHub instead of risking a stale push overwriting the shared file. */
function clearLocalCache(){
  if(!confirm("This clears this device's saved chores/points and re-downloads the latest from GitHub. Your GitHub connection details stay saved. Continue?")) return;
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem(SYNCED_KEY);
  location.reload();
}

/* ---------------- Weather ---------------- */
const WEATHER_LOCATIONS = [
  { postcode: "2762", label: "Schofields", lat: -33.746, lon: 150.944 },
  { postcode: "2000", label: "Sydney", lat: -33.8688, lon: 151.2093 },
];

let weatherData = { loaded: false, loading: false, error: null, byPostcode: {} };

function weatherIcon(code){
  if(code === 0) return "☀️";
  if(code === 1 || code === 2) return "🌤️";
  if(code === 3) return "☁️";
  if(code === 45 || code === 48) return "🌫️";
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return "🌧️";
  if([71,73,75,77,85,86].includes(code)) return "❄️";
  if([95,96,99].includes(code)) return "⛈️";
  return "🌡️";
}
function isRainCode(code){
  return [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code);
}

const DAY_PERIODS = [
  { key: "morning", label: "Morning", hour: 9 },
  { key: "afternoon", label: "Afternoon", hour: 15 },
  { key: "evening", label: "Evening", hour: 19 },
  { key: "night", label: "Night", hour: 23 },
];

async function fetchWeather(){
  weatherData.loading = true;
  weatherData.error = null;
  try{
    const results = await Promise.all(WEATHER_LOCATIONS.map(async loc => {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
        `&hourly=temperature_2m,weathercode,precipitation_probability` +
        `&timezone=Australia%2FSydney&forecast_days=3`;
      const res = await fetch(url);
      if(!res.ok) throw new Error("Weather service unavailable");
      const data = await res.json();
      const times = data.hourly.time; // "YYYY-MM-DDTHH:00"
      const byDate = {};
      times.forEach((t, i) => {
        const [datePart, timePart] = t.split("T");
        const hour = parseInt(timePart.slice(0,2), 10);
        if(!byDate[datePart]) byDate[datePart] = {};
        byDate[datePart][hour] = {
          temp: Math.round(data.hourly.temperature_2m[i]),
          code: data.hourly.weathercode[i],
          rainChance: data.hourly.precipitation_probability[i],
        };
      });
      const dates = Object.keys(byDate).slice(0, 3);
      const days = dates.map(date => {
        const periods = DAY_PERIODS.map(p => byDate[date][p.hour] || null);
        return { date, periods };
      });
      return [loc.postcode, days];
    }));
    weatherData.byPostcode = Object.fromEntries(results);
    weatherData.loaded = true;
  }catch(e){
    weatherData.error = e.message;
  }
  weatherData.loading = false;
  const zone = document.getElementById('weatherZone');
  if(zone) zone.innerHTML = renderWeatherZoneHtml();
}

function dayLabel(dateStr, idx){
  if(idx === 0) return "Today";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString('en-AU', {weekday:'short'});
}

function renderWeatherZoneHtml(){
  if(weatherData.error){
    return `<div class="empty-state">Couldn't load weather right now. <span style="text-decoration:underline; cursor:pointer;" onclick="fetchWeather()">Try again</span></div>`;
  }
  if(!weatherData.loaded){
    return `<div class="empty-state">Loading forecast... 🌤️</div>`;
  }
  return `<div class="weather-row">
    ${WEATHER_LOCATIONS.map(loc => {
      const days = weatherData.byPostcode[loc.postcode] || [];
      const allPeriods = days.flatMap(d => d.periods).filter(Boolean);
      const anyCold = allPeriods.some(p => p.temp < 18);
      const anyRain = allPeriods.some(p => isRainCode(p.code) || p.rainChance >= 40);
      return `
        <div class="weather-card">
          <div class="weather-card-title">📍 ${loc.label}</div>
          <table class="weather-table">
            <thead>
              <tr>
                <th></th>
                ${days.map((d,i) => `<th>${dayLabel(d.date,i)}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${DAY_PERIODS.map((p, pi) => `
                <tr>
                  <td class="period-label">${p.label}</td>
                  ${days.map(d => {
                    const cell = d.periods[pi];
                    if(!cell) return `<td>–</td>`;
                    return `<td>${weatherIcon(cell.code)}<br>${cell.temp}°</td>`;
                  }).join('')}
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="weather-tips">
            ${anyCold ? '<span class="weather-tip">🧥 Wear a sweater</span>' : ''}
            ${anyRain ? '<span class="weather-tip">☂️ Carry an umbrella</span>' : ''}
            ${(!anyCold && !anyRain) ? '<span class="weather-tip">😎 Nice days ahead</span>' : ''}
          </div>
        </div>
      `;
    }).join('')}
  </div>`;
}
function todayKey(d = new Date()){
  return d.toISOString().slice(0,10);
}
function startOfWeek(d){
  const dt = new Date(d);
  const day = (dt.getDay() + 6) % 7; // Monday=0
  dt.setDate(dt.getDate() - day);
  dt.setHours(0,0,0,0);
  return dt;
}
function fmtKey(d){ return todayKey(d); }
const WEEK_DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

/* ---------------- Points / stats ---------------- */
function pointsForDay(dateKey){
  const rec = state.completions[dateKey] || {};
  let total = 0;
  state.tasks.forEach(t => { if(rec[t.id]) total += t.points; });
  return total;
}
function maxDailyPoints(){
  return state.tasks.reduce((s,t)=>s+t.points,0);
}
function isDayComplete(dateKey){
  const rec = state.completions[dateKey] || {};
  if(state.tasks.length === 0) return false;
  return state.tasks.every(t => rec[t.id]);
}
function computeStreak(){
  let streak = 0;
  let d = new Date();
  // if today isn't complete yet, start counting from yesterday (streak still "alive")
  if(!isDayComplete(todayKey(d))){
    d.setDate(d.getDate()-1);
  }
  while(isDayComplete(todayKey(d))){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function weeklyTotal(refDate = new Date()){
  const start = startOfWeek(refDate);
  let total = 0;
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    total += pointsForDay(fmtKey(d));
  }
  return total;
}
function monthlyTotal(year, month){
  let total = 0;
  const days = new Date(year, month+1, 0).getDate();
  for(let day=1; day<=days; day++){
    const d = new Date(year, month, day);
    total += pointsForDay(fmtKey(d));
  }
  return total;
}

    if(liveBtn){ liveBtn.disabled = false; liveBtn.textContent = "🔁 Retry"; }

    if(liveStatus) liveStatus.textContent = "Couldn't sync — check your connection and try again.";
  }

        <tbody>${rowsHtml || `<tr><td class="empty-state" colspan="8">Add missions on the Daily tab to see them here.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="banner">${total} points earned this week · 🔥 ${streak}-day streak</div>
  `;
}

function renderMonthly(){
  const el = document.getElementById('tab-monthly');
  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const monthName = monthCursor.toLocaleString('default', {month:'long', year:'numeric'});
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Monday=0

  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let day=1; day<=daysInMonth; day++) cells.push(day);
  while(cells.length % 7 !== 0) cells.push(null);

  let heat = '<div class="heat-wrap">';
  for(let i=0;i<cells.length;i+=7){
    heat += '<div class="heat-row">';
    for(let j=i;j<i+7;j++){
      const day = cells[j];
      if(day === null){ heat += `<div class="heat-cell" style="background:transparent;"></div>`; continue; }
      const d = new Date(year, month, day);
      const max = maxDailyPoints();
      const pts = pointsForDay(fmtKey(d));
      const ratio = max ? pts/max : 0;
      const bg = ratio === 0 ? '#EFECE3' : ratio < 0.5 ? '#BEE8CD' : ratio < 1 ? '#6FCB93' : '#2FA36B';
      heat += `<div class="heat-cell" title="${fmtKey(d)}: ${pts} pts" style="background:${bg};"></div>`;
    }
    heat += '</div>';
  }
  heat += '</div>';

  const total = monthlyTotal(year, month);
  let bestStreak = 0, run = 0;
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(year, month, day);
    if(isDayComplete(fmtKey(d))){ run++; bestStreak = Math.max(bestStreak, run); } else { run = 0; }
  }
  const maxPossible = maxDailyPoints() * daysInMonth;
  const completion = maxPossible ? Math.round((total/maxPossible)*100) : 0;

  el.innerHTML = `
    <div class="month-nav">
      <button onclick="shiftMonth(-1)">‹</button>
      <div class="section-title" style="margin-top:0;">${monthName}</div>
      <button onclick="shiftMonth(1)">›</button>
    </div>
    ${heat}
    <div class="stats-row">
      <div class="stat-card" style="background:var(--green-soft);"><div>🏆</div><div class="stat-value">${total}</div><div class="stat-label">Total Points</div></div>
      <div class="stat-card" style="background:#FFF1EA;"><div>🔥</div><div class="stat-value">${bestStreak} days</div><div class="stat-label">Best Streak</div></div>
      <div class="stat-card" style="background:var(--blue-soft);"><div>⭐</div><div class="stat-value">${completion}%</div><div class="stat-label">Completion</div></div>
    </div>
  `;
}

function shiftMonth(delta){
  monthCursor.setMonth(monthCursor.getMonth()+delta);
  renderMonthly();
}

function renderAll(){
  renderHeader();
  updateModeButton();
  if(currentTab==='dashboard') renderDashboard();
  if(currentTab==='daily') renderDaily();
  if(currentTab==='weekly') renderWeekly();
  if(currentTab==='monthly') renderMonthly();
}

/* ---------------- Actions ---------------- */
function toggleTask(id){
  const today = todayKey();
  if(!state.completions[today]) state.completions[today] = {};
  state.completions[today][id] = !state.completions[today][id];
  save();
  renderAll();
  queueAutoPush();
}

const ICONS = ["🛏️","🦷","🐶","🎒","📚","🧸","🧹","🍽️","🚿","👕","🌱","📦","🥣","🧦","🚮","⚽"];
function addTaskPrompt(){
  const name = prompt("What's the new mission called?");
  if(!name) return;
  const pointsStr = prompt("How many points is it worth?", "10");
  const points = Math.max(0, parseInt(pointsStr,10) || 10);
  const icon = ICONS[Math.floor(Math.random()*ICONS.length)];
  state.tasks.push({id: state.nextTaskId++, name: name.trim(), icon, points});
  save();
  renderAll();
  queueAutoPush();
}
function updateTaskName(id, value){
  const t = state.tasks.find(t=>t.id===id);
  if(t){ t.name = value.trim() || t.name; save(); renderAll(); queueAutoPush(); }
}
function updateTaskPoints(id, value){
  const t = state.tasks.find(t=>t.id===id);
  if(t){ t.points = Math.max(0, parseInt(value,10) || 0); save(); renderAll(); queueAutoPush(); }
}
function deleteTask(id){
  if(!confirm("Remove this mission? Past history stays on the calendar.")) return;
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save();
  renderAll();
  queueAutoPush();
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ---------------- Cross-tab (same device) live update ---------------- */
window.addEventListener('storage', (e) => {
  if(e.key === STORE_KEY && e.newValue){
    try{
      state = JSON.parse(e.newValue);
      renderAll();
    }catch(err){}
  }
});

/* ---------------- Init ---------------- */
renderAll();
async function initSync(){
  if(!hasGhConfig()) { startAutoPoll(); return; }
  await withSyncLock(async () => {
    if(getSyncedJson() === null){
      // First time this device has ever synced — pull the real shared data first
      // so we don't push this device's blank/default state over everyone else's.
      await ghLoadLatest(true);
      if(getSyncedJson() === null){
        // Nothing existed in the repo yet — safe to bootstrap it with local state.
        await ghSyncNow(true);
      }
    } else if(hasUnsyncedChanges()){
      await ghSyncNow(true); // flush anything made on this device before we came back online
    } else {
      await ghLoadLatest(true);
    }
  }, { silent: true });
  startAutoPoll();
}
initSync();
</script>
